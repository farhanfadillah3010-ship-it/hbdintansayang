<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Intan</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,300..700;1,300..700&display=swap');

        :root {
            --burgundy-dark: #2b0d1e;
            --wine-deep: #4a1735;
            --plum: #6d204d;
            --pink-muted: #8d3d68;
            --pink-light: #f2a3c7;
            --pink-glow: #ffd5e8;
            --white-pink: #fff0f6;
            --glass-bg: rgba(74, 23, 53, 0.45);
            --glass-border: rgba(255, 213, 232, 0.25);
            --shadow-premium: 0 8px 32px 0 rgba(43, 13, 30, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--burgundy-dark), var(--wine-deep), var(--plum));
            color: var(--white-pink);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Ambient Canvas Background */
        #ambient-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Mouse Glow Effect Overlay */
        .mouse-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            background: radial-gradient(circle 150px at transparent transparent, rgba(242, 163, 199, 0.15), transparent 80%);
        }

        /* Utility Classes */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--shadow-premium);
            padding: 2.5rem;
            text-align: center;
            max-width: 420px;
            width: 90%;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-premium {
            background: linear-gradient(45deg, var(--pink-muted), var(--pink-light));
            color: var(--burgundy-dark);
            border: none;
            padding: 12px 30px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            letter-spacing: 1px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(242, 163, 199, 0.4);
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-premium:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 6px 20px rgba(242, 163, 199, 0.6);
            background: linear-gradient(45deg, var(--pink-light), var(--pink-glow));
        }

        .hidden {
            display: none !important;
            opacity: 0;
            pointer-events: none;
        }

        /* 1. LOADING SCREEN */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--burgundy-dark);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease-out;
        }

        .flower-spinner {
            width: 80px;
            height: 80px;
            position: relative;
            animation: spin 4s linear infinite;
        }

        .flower-spinner .petal {
            position: absolute;
            width: 25px;
            height: 45px;
            background: var(--pink-light);
            border-radius: 50% 50% 0% 50%;
            left: 27px;
            transform-origin: bottom center;
            opacity: 0.8;
            box-shadow: 0 0 15px var(--pink-light);
        }

        .flower-spinner .petal:nth-child(1) { transform: rotate(0deg); }
        .flower-spinner .petal:nth-child(2) { transform: rotate(60deg); background: var(--pink-glow); }
        .flower-spinner .petal:nth-child(3) { transform: rotate(120deg); }
        .flower-spinner .petal:nth-child(4) { transform: rotate(180deg); background: var(--pink-glow); }
        .flower-spinner .petal:nth-child(5) { transform: rotate(240deg); }
        .flower-spinner .petal:nth-child(6) { transform: rotate(300deg); background: var(--pink-glow); }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 2rem;
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: var(--white-pink);
            text-align: center;
            padding: 0 20px;
            letter-spacing: 0.5px;
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .loading-bar-container {
            width: 200px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-top: 1.5rem;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .loading-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--pink-light), var(--pink-glow));
            box-shadow: 0 0 12px var(--pink-light);
            transition: width 4s linear;
        }

        /* 2. PASSWORD PAGE */
        #password-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, var(--wine-deep), var(--burgundy-dark));
        }

        .pwd-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            animation: float 3s ease-in-out infinite;
        }

        .pwd-title {
            font-family: 'Great Vibes', cursive;
            font-size: 2.8rem;
            color: var(--pink-glow);
            margin-bottom: 0.2rem;
            text-shadow: 0 0 10px rgba(255, 213, 232, 0.3);
        }

        .pwd-subtitle {
            font-size: 0.9rem;
            font-weight: 300;
            letter-spacing: 1px;
            color: var(--white-pink);
            margin-bottom: 1.5rem;
            opacity: 0.9;
        }

        .pin-display {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 1.5rem;
        }

        .pin-dot {
            width: 16px;
            height: 16px;
            border: 2px solid var(--pink-light);
            border-radius: 50%;
            transition: all 0.2s ease;
        }

        .pin-dot.active {
            background: var(--pink-light);
            box-shadow: 0 0 12px var(--pink-light);
            transform: scale(1.1);
        }

        .pin-hint {
            font-size: 0.8rem;
            font-style: italic;
            color: var(--pink-light);
            margin-bottom: 1.5rem;
            opacity: 0.8;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            max-width: 280px;
            margin: 0 auto;
        }

        .key-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            width: 60px;
            height: 60px;
            margin: 0 auto;
            color: var(--white-pink);
            font-size: 1.3rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .key-btn:active, .key-btn:hover {
            background: var(--pink-muted);
            border-color: var(--pink-light);
            transform: scale(1.08);
            box-shadow: 0 0 10px rgba(242, 163, 199, 0.3);
        }

        .key-btn.action {
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.03);
        }

        .shake {
            animation: shakeAnim 0.4s ease-in-out;
        }

        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }

        .success-pulse {
            animation: successPulseAnim 0.6s ease-out forwards;
        }

        @keyframes successPulseAnim {
            50% { transform: scale(1.05); border-color: #5cb85c; box-shadow: 0 0 30px rgba(92,184,92,0.6); }
            100% { transform: scale(1); }
        }

        /* 3. OPENING GIFT SCREEN */
        #gift-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 98;
            background: radial-gradient(circle, var(--wine-deep), var(--burgundy-dark));
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .gift-txt {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            letter-spacing: 1px;
            margin-bottom: 3rem;
            text-align: center;
            animation: pulse 1.5s infinite alternate;
        }

        .gift-box-wrapper {
            position: relative;
            width: 180px;
            height: 180px;
            cursor: pointer;
            transform-style: preserve-3d;
            animation: float 4s ease-in-out infinite;
        }

        .gift-box-wrapper:hover .gift-box {
            box-shadow: 0 0 40px var(--pink-light);
        }

        .gift-box {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--plum), var(--pink-muted));
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.5s ease;
        }

        .gift-lid {
            position: absolute;
            top: -20px;
            left: -5px;
            width: 190px;
            height: 40px;
            background: linear-gradient(135deg, var(--pink-muted), var(--pink-light));
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 2;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .gift-ribbon-v {
            position: absolute;
            left: 50%;
            top: 0;
            width: 30px;
            height: 100%;
            background: linear-gradient(to bottom, var(--pink-glow), var(--white-pink));
            transform: translateX(-50%);
            border-radius: 4px;
        }

        .gift-ribbon-h {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 30px;
            background: linear-gradient(to right, var(--pink-glow), var(--white-pink));
            transform: translateY(-50%);
            border-radius: 4px;
        }

        .gift-bow {
            position: absolute;
            top: -45px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 3rem;
            z-index: 3;
            transition: all 0.6s ease;
        }

        /* Opened state animation triggers */
        .gift-box-wrapper.opened .gift-lid {
            transform: translate(-40px, -120px) rotate(-35deg);
            opacity: 0;
        }
        .gift-box-wrapper.opened .gift-bow {
            transform: translate(-40px, -140px) rotate(-35deg);
            opacity: 0;
        }
        .gift-box-wrapper.opened {
            animation: burstOut 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes burstOut {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); filter: brightness(1.5); box-shadow: 0 0 60px var(--pink-glow); }
            100% { transform: scale(0); opacity: 0; }
        }

        /* 4. POPUP BIRTHDAY CARD */
        #popup-card-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(43, 13, 30, 0.75);
            z-index: 500;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: opacity 0.6s ease;
        }

        .popup-cake {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            display: block;
        }

        .popup-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--pink-glow);
            margin-bottom: 0.5rem;
        }

        .popup-desc {
            font-family: 'Great Vibes', cursive;
            font-size: 2.2rem;
            color: var(--white-pink);
            margin-bottom: 2rem;
        }

        /* MAIN CONTENT STRUCTURE */
        #main-content {
            position: relative;
            z-index: 10;
            width: 100%;
            opacity: 1;
            transition: opacity 1s ease-in;
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
            padding: 4rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 6rem;
        }

        section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: translateY(40px);
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .section-tag {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--pink-light);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            text-align: center;
            color: var(--pink-glow);
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .section-subtitle {
            font-size: 0.9rem;
            color: var(--white-pink);
            opacity: 0.8;
            text-align: center;
            margin-bottom: 2.5rem;
            font-weight: 300;
        }

        /* 5. HERO SECTION */
        #hero-section {
            min-height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding-top: 2rem;
        }

        .hero-tag {
            font-size: 0.9rem;
            letter-spacing: 4px;
            color: var(--pink-light);
            margin-bottom: 1.5rem;
            animation: fadeInDown 1.2s ease-out;
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: 3.8rem;
            font-weight: 900;
            line-height: 1.1;
            color: var(--white-pink);
            margin-bottom: 1.5rem;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .hero-title span {
            display: block;
        }

        .hero-title .name {
            font-family: 'Great Vibes', cursive;
            font-size: 5.5rem;
            color: var(--pink-glow);
            font-weight: 400;
            margin-top: 0.2rem;
            text-shadow: 0 0 20px rgba(242, 163, 199, 0.4);
        }

        .hero-sub {
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 2px;
            opacity: 0.9;
            margin-bottom: 3rem;
        }

        .scroll-indicator {
            font-size: 1.5rem;
            animation: bounce 2s infinite;
            opacity: 0.7;
            margin-top: auto;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        /* 6. MUSIC PLAYER (FLOATING & EXPANDABLE) */
        #music-container {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        #music-trigger {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--plum), var(--pink-muted));
            border: 1px solid var(--pink-light);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--white-pink);
            font-size: 1.3rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #music-trigger.playing {
            animation: spin 6s linear infinite;
            box-shadow: 0 0 20px var(--pink-light);
        }

        #mini-player {
            width: 300px;
            padding: 1.5rem;
            margin-bottom: 15px;
            transform: scale(0.8) translateY(30px);
            opacity: 0;
            pointer-events: none;
            transform-origin: bottom right;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #mini-player.active {
            transform: scale(1) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        .player-track-info {
            text-align: center;
            margin-bottom: 1rem;
        }

        .track-title {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--pink-glow);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-artist {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-top: 2px;
        }

        .progress-block {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.7rem;
            margin-bottom: 1rem;
        }

        .progress-bar-wrap {
            flex: 1;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: var(--pink-light);
            border-radius: 2px;
        }

        .player-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            margin-bottom: 1rem;
        }

        .ctrl-btn {
            background: none;
            border: none;
            color: var(--white-pink);
            cursor: pointer;
            font-size: 1.1rem;
            transition: color 0.
