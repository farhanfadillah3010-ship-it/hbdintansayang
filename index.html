<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Eternal Symphony of Love v4.0 🌹</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800;900&family=Montserrat:wght@200;300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================================================
           1. CORE DESIGN SYSTEMS & LUXURY VARIABLES
           ========================================================================== */
        :root {
            --royal-gold: #e5c158;
            --liquid-gold: linear-gradient(135deg, #b8860b 0%, #fef1d2 50%, #b8860b 100%);
            --gold-glow: rgba(229, 193, 88, 0.35);
            --velvet-black: #07030a;
            --deep-wine: #2d0b13;
            --crimson-pulse: #ff4d6d;
            --cosmic-purple: #1a0926;
            --glass-sheet: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(229, 193, 88, 0.18);
            --transition-smooth: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Anti-Lag Hardware Acceleration Configurations */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            user-select: none;
        }

        body {
            background: linear-gradient(180deg, #07030a 0%, #160720 50%, #020005 100%);
            color: #f3eff5;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Custom Luxury Scrollbar Mechanics */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--velvet-black);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--liquid-gold);
            border-radius: 10px;
        }

        /* ==========================================================================
           2. UNIVERSAL ANIMATION MATRIX (CSS3 High Performance)
           ========================================================================== */
        @keyframes floatStructural {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }

        @keyframes pulseGlowAmbient {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.15); }
        }

        @keyframes slideInPanel {
            from { opacity: 0; transform: translateY(50px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes shimmerText {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        /* ==========================================================================
           3. BACKGROUND VISUAL EFFECTS LAYER (Canvas Starfield)
           ========================================================================== */
        #cosmicParticleStage {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: auto;
        }

        .aurora-veil-top {
            position: fixed;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(45, 11, 19, 0.25) 0%, rgba(0,0,0,0) 70%);
            top: -300px;
            left: -200px;
            z-index: 2;
            pointer-events: none;
            animation: pulseGlowAmbient 15s infinite ease-in-out;
        }

        .aurora-veil-bottom {
            position: fixed;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(26, 9, 38, 0.3) 0%, rgba(0,0,0,0) 70%);
            bottom: -200px;
            right: -100px;
            z-index: 2;
            pointer-events: none;
            animation: pulseGlowAmbient 12s infinite ease-in-out alternate;
        }

        /* ==========================================================================
           4. RENDER DOCK: HIGH-PRESTIGE FIXED NAVIGATION
           ========================================================================== */
        .royal-navigation-dock {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(7, 3, 10, 0.88);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 1000;
            padding: 15px 0;
            box-shadow: 0 15px 50px rgba(0,0,0,0.9);
        }

        .nav-container-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 40px;
        }

        .royal-brand-signature {
            font-family: 'Cinzel', serif;
            font-weight: 900;
            font-size: 1.5rem;
            background: var(--liquid-gold);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
            animation: shimmerText 6s linear infinite;
            text-shadow: 0 0 30px rgba(229,193,88,0.2);
        }

        .nav-scroller-track {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .nav-scroller-track::-webkit-scrollbar { display: none; }

        .luxury-nav-trigger {
            background: transparent;
            border: 1px solid rgba(229, 193, 88, 0.15);
            color: #c9b0d1;
            padding: 12px 26px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }

        .luxury-nav-trigger::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: 0.5s;
        }

        .luxury-nav-trigger:hover::before {
            left: 100%;
        }

        .luxury-nav-trigger.active-node, .luxury-nav-trigger:hover {
            border-color: var(--royal-gold);
            color: var(--velvet-black);
            background: var(--liquid-gold);
            box-shadow: 0 0 25px var(--gold-glow);
            transform: translateY(-2px);
        }

        /* ==========================================================================
           5. MAIN VIEWPORT WRAPPER & ARCHITECTURE
           ========================================================================== */
        .stage-viewport-master {
            margin-top: 120px;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            min-height: calc(100vh - 120px);
            position: relative;
            z-index: 10;
        }

        .content-conduit-max {
            width: 100%;
            max-width: 1000px;
        }

        .luxury-module-card {
            display: none;
            background: linear-gradient(145deg, rgba(15, 7, 21, 0.4) 0%, rgba(5, 2, 8, 0.6) 100%);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 70px 55px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.95), inset 0 0 40px rgba(229,193,88,0.02);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            animation: slideInPanel 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .luxury-module-card.active-node { display: block; }

        .card-title-gold {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 4rem;
            font-weight: 700;
            text-align: center;
            background: var(--liquid-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .card-subtitle-velvet {
            text-align: center;
            color: #a491ac;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 50px;
        }

        .premium-action-trigger {
            background: var(--liquid-gold);
            border: none;
            color: var(--velvet-black);
            padding: 16px 45px;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(229,193,88,0.2);
            transition: var(--transition-smooth);
            display: inline-block;
        }

        .premium-action-trigger:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 15px 40px rgba(229,193,88,0.45);
            letter-spacing: 3.5px;
        }

        /* ==========================================================================
           6. ARCHITECTURE: MODULE 1 (THE ROMANTIC SANCTUARY)
           ========================================================================== */
        .sanctuary-centerpiece {
            text-align: center;
        }

        .grand-monarch-seal {
            font-size: 4rem;
            margin-bottom: 25px;
            animation: floatStructural 6s infinite ease-in-out;
            display: inline-block;
            filter: drop-shadow(0 0 25px rgba(255,77,109,0.5));
        }

        .epistolary-scroll-box {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            line-height: 2.2;
            color: #eae3ec;
            text-align: center;
            margin: 45px 0;
            padding: 35px 20px;
            border-top: 1px solid rgba(229, 193, 88, 0.2);
            border-bottom: 1px solid rgba(229, 193, 88, 0.2);
            font-style: italic;
            position: relative;
        }

        .epistolary-scroll-box::before, .epistolary-scroll-box::after {
            content: '〃';
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            color: var(--royal-gold);
            position: absolute;
            opacity: 0.3;
        }
        .epistolary-scroll-box::before { top: -10px; left: 10px; }
        .epistolary-scroll-box::after { bottom: -30px; right: 10px; }

        .epistolary-scroll-box span {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            color: var(--royal-gold);
            font-style: normal;
            text-shadow: 0 0 15px rgba(229,193,88,0.3);
        }

        /* Quantum Chrono Matrix Displays */
        .quantum-chrono-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 55px;
            flex-wrap: wrap;
        }

        .chrono-capsule-node {
            background: rgba(12, 5, 18, 0.7);
            border: 1px solid rgba(229, 193, 88, 0.15);
            border-radius: 20px;
            padding: 25px;
            min-width: 140px;
            box-shadow: 0 20px 45px rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            transition: var(--transition-smooth);
        }

        .chrono-capsule-node:hover {
            border-color: var(--royal-gold);
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(229,193,88,0.15);
        }

        .chrono-numerical-core {
            font-family: 'Cinzel', serif;
            font-size: 2.8rem;
            font-weight: 900;
            background: var(--liquid-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: block;
        }

        .chrono-descriptor-tag {
            font-size: 0.75rem;
            color: #b5a2bc;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 10px;
            display: block;
            font-weight: 500;
        }

        /* ==========================================================================
           7. ARCHITECTURE: MODULE 2 (3D CELESTIAL CAKE CONSTRUCT)
           ========================================================================== */
        .theatre-isometrique-cake {
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            position: relative;
            padding-bottom: 40px;
        }

        .cake-foundation-cylinder {
            position: relative;
            width: 320px;
            height: 100px;
            background: linear-gradient(to bottom, #1d0716, #090207);
            border-radius: 50%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            z-index: 5;
            border: 1px solid rgba(229, 193, 88, 0.25);
        }

        .cake-stratum-secondary {
            position: absolute;
            width: 260px;
            height: 90px;
            background: linear-gradient(to bottom, #3a0d25, #14030c);
            border-radius: 50%;
            bottom: 50px; left: 30px;
            z-index: 6;
            border-bottom: 6px solid var(--royal-gold);
        }

        .cake-stratum-apex {
            position: absolute;
            width: 200px;
            height: 80px;
            background: linear-gradient(to bottom, #5a1236, #210413);
            border-radius: 50%;
            bottom: 100px; left: 60px;
            z-index: 7;
            border-bottom: 4px solid #fff1d2;
        }

        .candle-constellation-array {
            position: absolute;
            width: 100%; height: 100%;
            z-index: 25; top: -60px; left: 0;
            pointer-events: none;
        }

        .monarch-candle-unit {
            position: absolute;
            width: 10px; height: 60px;
            background: linear-gradient(to right, #b8860b, #fef1d2, #b8860b);
            border-radius: 6px;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            transition: transform 0.4s ease;
        }
        .monarch-candle-unit:hover { transform: scaleY(1.1); }

        /* Isometric Multi-Candle Grid Arrays */
        .candle-node-1 { bottom: 140px; left: 80px; }
        .candle-node-2 { bottom: 155px; left: 110px; }
        .candle-node-3 { bottom: 160px; left: 145px; }
        .candle-node-4 { bottom: 155px; left: 180px; }
        .candle-node-5 { bottom: 140px; left: 210px; }

        .pyrotechnic-candle-igniter {
            width: 16px; height: 28px;
            background: radial-gradient(circle, #fff 15%, #ff4d6d 55%, #2d0b13 95%, transparent 100%);
            border-radius: 50% 50% 35% 35%;
            position: absolute;
            top: -25px; left: -3px;
            box-shadow: 0 0 25px #ff4d6d, 0 0 50px #2d0b13;
            animation: romanticFlicker 0.1s infinite alternate ease-in-out;
            transition: var(--transition-smooth);
        }

        .monarch-candle-unit.extinguished-state .pyrotechnic-candle-igniter {
            opacity: 0;
            transform: scale(0) translateY(-15px);
            pointer-events: none;
        }

        /* ==========================================================================
           8. ARCHITECTURE: MODULE 3 (COSMIC LOVE DEFENDER ARCADE MACHINE)
           ========================================================================== */
        .arcade-housing-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #arcadeRenderMatrix {
            background: #030105;
            border: 2px solid var(--royal-gold);
            box-shadow: 0 0 50px rgba(229,193,88,0.15), inset 0 0 30px rgba(0,0,0,0.9);
            border-radius: 24px;
            max-width: 100%;
            cursor: none;
        }

        .arcade-dashboard-panel {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 600px;
            margin-top: 30px;
            align-items: center;
        }

        .arcade-telemetry-text {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            color: #fff1d2;
            letter-spacing: 2px;
            font-weight: 700;
        }

        /* ==========================================================================
           9. ARCHITECTURE: MODULE 4 (THE 3D OCTAGONAL CAROUSEL)
           ========================================================================== */
        .carousel-space-container {
            height: 420px;
            perspective: 2000px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .carousel-rotational-core {
            width: 260px;
            height: 320px;
            position: absolute;
            transform-style: preserve-3d;
            transition: transform 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .carousel-monolith-slab {
            position: absolute;
            width: 260px;
            height: 310px;
            left: 0; top: 0;
            background: linear-gradient(145deg, #180614, #050105);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            text-align: center;
            backface-visibility: hidden;
            box-shadow: 0 25px 60px rgba(0,0,0,0.9);
        }

        /* 3D Space Transformations Matrix for 5 Plates (Radius 350px) */
        .slab-node-1 { transform: rotateY(0deg) translateZ(350px); }
        .slab-node-2 { transform: rotateY(72deg) translateZ(350px); }
        .slab-node-3 { transform: rotateY(144deg) translateZ(350px); }
        .slab-node-4 { transform: rotateY(216deg) translateZ(350px); }
        .slab-node-5 { transform: rotateY(288deg) translateZ(350px); }

        .slab-icon-wrapper { font-size: 2.8rem; margin-bottom: 25px; filter: drop-shadow(0 0 15px rgba(255,77,109,0.4)); }
        .slab-header-text { font-family: 'Playfair Display', serif; font-style: italic; color: #fef1d2; margin-bottom: 15px; font-size: 1.3rem; font-weight: 700; }
        .slab-body-text { font-size: 0.85rem; color: #daccd3; line-height: 1.8; font-weight: 300; }

        .carousel-control-deck {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 35px;
        }

        /* ==========================================================================
           10. ARCHITECTURE: MODULE 5 (DESTINY ORACLE MATRIX)
           ========================================================================== */
        .tarot-grid-matrix {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .tarot-interactive-node {
            width: 180px;
            height: 290px;
            perspective: 1200px;
            cursor: pointer;
        }

        .tarot-rotator-sleeve {
            position:
